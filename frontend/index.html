<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchScan — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  .auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    width: 100%;
    max-width: 400px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
  }

  .auth-brand {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 20px;
    margin-bottom: 6px;
  }

  .auth-brand-mark { color: var(--amber); font-size: 19px; }
  .auth-brand-accent { color: var(--amber); }

  .auth-tagline {
    text-align: center;
    color: var(--text-dim);
    font-size: 12.5px;
    font-family: var(--mono);
    margin: 0 0 28px;
  }

  .auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 3px;
    margin-bottom: 22px;
  }

  .auth-tab {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--body);
    font-size: 13px;
    font-weight: 500;
    padding: 9px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .auth-tab.active { background: var(--panel-raised); color: var(--text); }

  .auth-form { display: none; flex-direction: column; gap: 14px; }
  .auth-form.active { display: flex; }

  .field-label {
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    padding: 11px 13px;
  }

  .field-input:focus { outline: none; border-color: var(--amber); }
  .field-input::placeholder { color: var(--text-faint); }

  .auth-submit {
    margin-top: 6px;
    background: var(--amber);
    color: #1A1305;
    border: none;
    font-family: var(--display);
    font-weight: 600;
    font-size: 14.5px;
    padding: 13px;
    border-radius: 9px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }

  .auth-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px -4px rgba(232, 169, 58, 0.5); }
  .auth-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

  .auth-error {
    color: var(--coral);
    font-size: 12.5px;
    font-family: var(--mono);
    text-align: center;
    min-height: 16px;
    margin: 4px 0 0;
  }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0 16px;
    color: var(--text-faint);
    font-size: 11.5px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .auth-divider::before, .auth-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .google-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--panel-raised);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--body);
    font-size: 13.5px;
    font-weight: 500;
    padding: 11px;
    border-radius: 9px;
    cursor: not-allowed;
    opacity: 0.6;
  }

  .google-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="scan-bg" aria-hidden="true"></div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-brand-mark">◎</span>
      <span>MATCH<span class="auth-brand-accent">SCAN</span></span>
    </div>
    <p class="auth-tagline">resume × job description compatibility reader</p>

    <div class="auth-tabs">
      <button class="auth-tab active" data-target="loginForm">Log in</button>
      <button class="auth-tab" data-target="signupForm">Create account</button>
    </div>

    <!-- LOGIN -->
    <form class="auth-form active" id="loginForm">
      <div>
        <label class="field-label" for="loginEmail">Email</label>
        <input class="field-input" type="email" id="loginEmail" placeholder="you@example.com" required>
      </div>
      <div>
        <label class="field-label" for="loginPassword">Password</label>
        <input class="field-input" type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button class="auth-submit" type="submit" id="loginSubmit">Log in</button>
      <p class="auth-error" id="loginError"></p>
    </form>

    <!-- SIGNUP -->
    <form class="auth-form" id="signupForm">
      <div>
        <label class="field-label" for="signupName">Full name</label>
        <input class="field-input" type="text" id="signupName" placeholder="Harini S">
      </div>
      <div>
        <label class="field-label" for="signupEmail">Email</label>
        <input class="field-input" type="email" id="signupEmail" placeholder="you@example.com" required>
      </div>
      <div>
        <label class="field-label" for="signupPassword">Password</label>
        <input class="field-input" type="password" id="signupPassword" placeholder="At least 6 characters" required minlength="6">
      </div>
      <button class="auth-submit" type="submit" id="signupSubmit">Create account</button>
      <p class="auth-error" id="signupError"></p>
    </form>

    <div class="auth-divider">or</div>
    <button class="google-btn" disabled>
      <span>G</span> Continue with Google
    </button>
    <p class="google-note">Coming soon — use email for now</p>
  </div>
</div>

<script src="auth.js"></script>
<script>
  // Redirect straight to dashboard if already logged in
  if (getToken()) window.location.href = "dashboard.html";

  // Tab switching
  document.querySelectorAll(".auth-tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".auth-tab").forEach((t) => t.classList.remove("active"));
      document.querySelectorAll(".auth-form").forEach((f) => f.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(tab.dataset.target).classList.add("active");
    });
  });

  // Login submit
  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("loginError");
    const btn = document.getElementById("loginSubmit");
    errorEl.textContent = "";
    btn.disabled = true;
    btn.textContent = "Logging in…";

    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: document.getElementById("loginEmail").value.trim(),
          password: document.getElementById("loginPassword").value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Login failed");
      saveSession(data);
      window.location.href = "dashboard.html";
    } catch (err) {
      errorEl.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "Log in";
    }
  });

  // Signup submit
  document.getElementById("signupForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("signupError");
    const btn = document.getElementById("signupSubmit");
    errorEl.textContent = "";
    btn.disabled = true;
    btn.textContent = "Creating account…";

    try {
      const res = await fetch("/api/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          full_name: document.getElementById("signupName").value.trim(),
          email: document.getElementById("signupEmail").value.trim(),
          password: document.getElementById("signupPassword").value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Signup failed");
      saveSession(data);
      window.location.href = "dashboard.html";
    } catch (err) {
      errorEl.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = "Create account";
    }
  });
</script>
</body>
</html>
